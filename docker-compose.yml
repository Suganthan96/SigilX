services:
  api:
    build: .
    command: uvicorn services.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    restart: unless-stopped

  mcp:
    build: .
    command: python -m services.api.mcp_server
    ports:
      - "8001:8001"
    env_file: .env
    restart: unless-stopped
